version: '2'
linters:
  default: all
  disable:
    - depguard
    - nlreturn
    - noinlineerr
    - paralleltest
    - varnamelen
    - wsl
    - wsl_v5
  settings:
    sloglint:
      attr-only: true
    cyclop:
      max-complexity: 20
    funlen:
      lines: 70
      statements: 50
      ignore-comments: true
    gosec:
      excludes:
        - G203
    misspell:
      locale: US
      ignore-rules:
        - Teh
    mnd:
      ignored-files:
        - milestone.go
        - interview.go
        - zoo.go
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
        - .HTML(
        - .Inline(
        - .JSON(
        - .JSONPretty(
        - .Redirect(
        - .Render(
        - .String(
        - .Text(
        - app.StatusErr(
      ignore-package-globs:
        - github.com/aarondl/sqlboiler/v4/*
        - github.com/aarondl/sqlboiler/*
        - github.com/Defacto2/server/internal/postgres/*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
        path: ^model/files\.go$
      - linters: # unit tests
          - cyclop
          - dogsled
          - dupl
          - exhaustive
          - exhaustruct
          - funlen
          - gocyclo
          - ireturn
          - lll
          - misspell
          - mnd
          - wrapcheck
        path: _test\.go$
      - linters: # documentation
          - lll
        path: doc.go
      - linters:
          - funlen
          - lll
        path: handler/app/accordion.go
      - linters:
          - funlen
        path: handler/app/interview.go
      - linters:
          - exhaustruct
          - funlen
          - lll
          - maintidx
        path: handler/app/milestone.go
      - linters:
          - dupl
          - wrapcheck
        path: handler/htmx/artifact.go
      - linters:
          - mnd
        path: handler/janeway/janeway.go
      - linters:
          - lll
        path: handler/jsdos/jsdos.go
      - linters:
          - dupl
          - funlen
          - wrapcheck
        path: handler/router.go
      - linters:
          - dupl
          - funlen
          - wrapcheck
        path: handler/routerhtmx.go
      - linters:
          - dupl
          - funlen
          - wrapcheck
        path: handler/routerlock.go
      - linters:
          - funlen
          - maintidx
        path: handler/site/site.go
      - linters:
          - funlen
          - lll
        path: handler/tidbit/tidbit.go
      - linters:
          - dupl
        path: internal/command/images.go
      #- linters:
      #    - lll
      #    - tagalign
      #  path: internal/config/config.go
      - linters:
          - lll
          - tagalign
        path: internal/postgres/postgres\.go$
      - linters: #requirement
          - ireturn
        path: model/querymod/querymod.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
